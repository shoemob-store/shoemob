<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="SHOEMOB">
<meta name="application-name" content="SHOEMOB">
<meta name="mobile-web-app-capable" content="yes">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<link rel="manifest" id="pwa-manifest">
<title>SHOEMOB — Premium Footwear & Elite Mobile Accessories</title>
<meta name="description" content="SHOEMOB — Where luxury footwear meets elite mobile accessories. Shop premium sneakers, leather shoes, phone cases, wireless earbuds and more.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap&font-display=swap" rel="stylesheet">
<style>
:root {
  /* ══ SHOPIFY WHITE & BLACK ══ */
  --black:   #ffffff;   /* page bg — pure white */
  --black2:  #f4f4f4;   /* card bg — off white */
  --black3:  #e8e8e8;   /* input bg — light gray */
  --gold:    #111111;   /* accent — rich black */
  --gold2:   #333333;   /* lighter black */
  --gold3:   #666666;   /* soft black */
  --cream:   #111111;   /* primary text — deep black */
  --cream2:  #333333;   /* secondary text */
  --cream3:  #777777;   /* muted text */
  --white:   #ffffff;
  --gray:    #888888;
  --gray2:   #aaaaaa;
  --red:     #e53e3e;
  --green:   #38a169;
  --font-display: 'Bebas Neue', sans-serif;
  --font-serif:   'Cormorant Garamond', serif;
  --font-body:    'DM Sans', sans-serif;
  --transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  --shadow:      0 2px 20px rgba(0,0,0,0.08);
  --shadow-gold: 0 4px 24px rgba(0,0,0,0.15);
  --radius:  4px;
  --radius2: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: #ffffff;
  color: #111111;
  font-family: var(--font-body);
  font-weight: 400;
  line-height: 1.65;
  overflow-x: hidden;
}
body.no-scroll { overflow: hidden; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #f4f4f4; }
::-webkit-scrollbar-thumb { background: #111; border-radius: 2px; }

::selection { background: #111; color: #fff; }

/* ============ INTRO SCREEN ============ */
#intro-screen {
  position: fixed;
  inset: 0;
  background: #0d0d0d;
  z-index: 99999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#intro-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.intro-particles {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #3b82f6;
  border-radius: 50%;
  animation: floatParticle linear infinite;
  opacity: 0;
}

@keyframes floatParticle {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.4; }
  90% { opacity: 0.4; }
  100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
}

.intro-logo {
  font-family: var(--font-display);
  font-size: clamp(52px, 15vw, 120px);
  letter-spacing: 0.2em;
  color: transparent;
  background: linear-gradient(135deg, #2563eb, #3b82f6, #60a5fa, #3b82f6);
  -webkit-background-clip: text;
  background-clip: text;
  animation: shimmerLogo 2s ease-in-out infinite, revealLogo 1s ease forwards;
  opacity: 0;
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 0 16px;
}

@keyframes shimmerLogo {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.3) drop-shadow(0 0 20px rgba(201,168,76,0.8)); }
}
@keyframes revealLogo {
  0% { opacity: 0; transform: scale(0.8) translateY(20px); letter-spacing: 0.5em; }
  100% { opacity: 1; transform: scale(1) translateY(0); letter-spacing: 0.2em; }
}

.intro-tagline {
  font-family: var(--font-serif);
  font-style: italic;
  color: var(--gray);
  font-size: clamp(13px, 3.5vw, 18px);
  letter-spacing: 0.12em;
  margin-top: 12px;
  opacity: 0;
  animation: fadeInUp 0.8s ease 0.5s forwards;
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 0 24px;
  max-width: 480px;
  line-height: 1.6;
}

.intro-progress-bar {
  width: 200px;
  height: 2px;
  background: var(--black3);
  margin-top: 40px;
  border-radius: 2px;
  overflow: hidden;
  position: relative;
  z-index: 2;
}

.intro-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  width: 0%;
  transition: width 4s linear;
  border-radius: 2px;
}

.intro-skip {
  position: absolute;
  bottom: 30px;
  right: 30px;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: var(--font-body);
  font-size: 12px;
  letter-spacing: 0.2em;
  padding: 8px 20px;
  cursor: pointer;
  transition: var(--transition);
  z-index: 2;
  text-transform: uppercase;
  border-radius: 3px;
}
.intro-skip:hover { background: var(--gold); color: white; }

.intro-progress-bar {
  width: 200px;
  height: 2px;
  background: var(--black3);
  margin-top: 40px;
  border-radius: 2px;
  overflow: hidden;
  position: relative;
  z-index: 2;
}

.intro-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  width: 0%;
  transition: width 4s linear;
  border-radius: 2px;
}

.intro-skip {
  position: absolute;
  bottom: 30px;
  right: 30px;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: var(--font-body);
  font-size: 12px;
  letter-spacing: 0.2em;
  padding: 8px 20px;
  cursor: pointer;
  transition: var(--transition);
  z-index: 2;
  text-transform: uppercase;
}
.intro-skip:hover { background: var(--gold); color: var(--black); }

/* ============ NAV ============ */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  padding: 0 4%;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: var(--transition);
  border-bottom: 1px solid transparent;
}
nav.scrolled {
  background: rgba(13,13,13,0.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom-color: rgba(59,130,246,0.2);
  box-shadow: 0 2px 20px rgba(59,130,246,0.1);
}

.nav-logo {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 0.15em;
  background: linear-gradient(135deg, #1d4ed8, #3b82f6);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  cursor: pointer;
  text-decoration: none;
  flex-shrink: 0;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
  list-style: none;
}

.nav-links a {
  color: var(--cream2);
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 500;
  transition: var(--transition);
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 0;
  height: 1px;
  background: #3b82f6;
  transition: var(--transition);
}
.nav-links a:hover { color: var(--gold); }
.nav-links a:hover::after { width: 100%; }
.nav-links a.active { color: var(--gold); }
.nav-links a.active::after { width: 100%; }

.nav-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}

.nav-btn {
  background: transparent;
  border: none;
  color: var(--cream);
  cursor: pointer;
  padding: 8px 10px;
  position: relative;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
}
.nav-btn:hover { color: var(--gold); background: rgba(59,130,246,0.08); }
.nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

.cart-count {
  position: absolute;
  top: 4px;
  right: 4px;
  background: #3b82f6;
  color: #ffffff;
  width: 17px;
  height: 17px;
  border-radius: 50%;
  font-size: 9px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-body);
  line-height: 1;
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 8px;
  background: none;
  border: none;
  z-index: 1001;
  position: relative;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--cream);
  transition: var(--transition);
  border-radius: 2px;
}
.hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); background: var(--gold); }
.hamburger.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); background: var(--gold); }

.mobile-menu {
  position: fixed;
  top: 70px;
  left: 0;
  right: 0;
  background: rgba(13,13,13,0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 24px 6% 32px;
  transform: translateY(-110%);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 998;
  border-bottom: 1px solid rgba(59,130,246,0.2);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.mobile-menu.open { transform: translateY(0); }
.mobile-menu .nav-links {
  flex-direction: column;
  align-items: flex-start;
  gap: 0;
  display: flex;
}
.mobile-menu .nav-links li { width: 100%; border-bottom: 1px solid rgba(59,130,246,0.06); }
.mobile-menu .nav-links a {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.12em;
  display: block;
  padding: 14px 0;
  width: 100%;
}
.mobile-menu .nav-links a:hover { padding-left: 8px; color: var(--gold); }

/* ============ PAGES ============ */
.page { display: none; }
.page.active { display: block; }

/* ============ SECTIONS ============ */
section { padding: 80px 4%; }
.section-label {
  font-size: 11px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 12px;
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 5vw, 56px);
  letter-spacing: 0.05em;
  line-height: 1;
  color: var(--cream);
  margin-bottom: 16px;
}
.section-subtitle {
  font-family: var(--font-serif);
  font-style: italic;
  color: var(--gray);
  font-size: 16px;
  max-width: 500px;
}

/* ============ HERO ============ */
#hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 0 4%;
  position: relative;
  overflow: hidden;
  padding-top: 70px;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse 60% 80% at 70% 50%, rgba(59,130,246,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 20% 80%, rgba(59,130,246,0.04) 0%, transparent 60%);
}

.hero-grid-lines {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
}

.hero-content {
  max-width: 700px;
  position: relative;
  z-index: 2;
  animation: fadeInUp 1s ease 0.3s both;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid rgba(59,130,246,0.4);
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 24px;
}
.hero-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  background: #3b82f6;
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(64px, 10vw, 120px);
  line-height: 0.92;
  letter-spacing: 0.02em;
  margin-bottom: 20px;
}

.hero-title span.gold {
  color: transparent;
  background: linear-gradient(135deg, var(--gold3), var(--gold), var(--gold2));
  -webkit-background-clip: text;
  background-clip: text;
}

.hero-subtitle {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(16px, 2.5vw, 22px);
  color: var(--gray);
  margin-bottom: 40px;
  line-height: 1.5;
}

.hero-buttons {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.btn-primary {
  background: linear-gradient(135deg, #1d4ed8, #3b82f6);
  color: #ffffff;
  border: none;
  padding: 14px 32px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: var(--transition);
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
}
.btn-primary::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.2);
  transform: translateX(-100%);
  transition: transform 0.3s ease;
}
.btn-primary:hover::after { transform: translateX(0); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,0.4); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: transparent;
  color: var(--cream);
  border: 1px solid rgba(59,130,246,0.35);
  padding: 13px 32px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: var(--transition);
  border-radius: var(--radius);
}
.btn-secondary:hover {
  border-color: var(--gold);
  color: var(--gold);
  transform: translateY(-2px);
}

.btn-outline-gold {
  background: transparent;
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 12px 28px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: var(--transition);
  border-radius: var(--radius);
}
.btn-outline-gold:hover { background: var(--gold); color: var(--black); transform: translateY(-2px); }

.btn-whatsapp {
  background: #25D366;
  color: white;
  border: none;
  padding: 14px 28px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: var(--transition);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  justify-content: center;
}
.btn-whatsapp:hover { background: #20c95c; transform: translateY(-2px); }

.hero-floating-cards {
  position: absolute;
  right: 5%;
  top: 50%;
  transform: translateY(-50%);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  z-index: 2;
  animation: fadeInRight 1s ease 0.5s both;
}

@keyframes fadeInRight {
  from { opacity: 0; transform: translateY(-50%) translateX(40px); }
  to { opacity: 1; transform: translateY(-50%) translateX(0); }
}

.float-card {
  background: var(--black2);
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: var(--radius2);
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100px;
  height: 100px;
  transition: var(--transition);
  cursor: default;
}
.float-card:hover {
  border-color: var(--gold);
  transform: translateY(-5px);
  box-shadow: var(--shadow-gold);
}
.float-card .icon { font-size: 28px; }
.float-card .label {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray);
  text-align: center;
}
.float-card:nth-child(2) { margin-top: 30px; }
.float-card:nth-child(4) { margin-top: 30px; }

.hero-stats {
  display: flex;
  gap: 40px;
  margin-top: 48px;
}
.stat { }
.stat-num {
  font-family: var(--font-display);
  font-size: 36px;
  letter-spacing: 0.05em;
  color: var(--gold);
  line-height: 1;
}
.stat-label {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gray);
  margin-top: 4px;
}

/* ============ MARQUEE ============ */
.marquee-section {
  padding: 0;
  background: linear-gradient(90deg, #f0ede8, #2d3561, #f0ede8);
  overflow: hidden;
  white-space: nowrap;
}
.marquee-track {
  display: inline-flex;
  animation: marquee 25s linear infinite;
}
.marquee-item {
  display: inline-flex;
  align-items: center;
  gap: 16px;
  padding: 14px 32px;
  font-family: var(--font-display);
  font-size: 16px;
  letter-spacing: 0.15em;
  color: #f0ede8;
}
.marquee-dot { font-size: 8px; color: var(--gold2); opacity: 0.8; }

@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ============ PRODUCT CARDS ============ */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 24px;
  margin-top: 40px;
}

.product-card {
  background: var(--black2);
  border: 1px solid rgba(59,130,246,0.1);
  border-radius: var(--radius2);
  overflow: hidden;
  transition: var(--transition);
  cursor: pointer;
  position: relative;
}
.product-card:hover {
  border-color: rgba(59,130,246,0.4);
  transform: translateY(-6px);
  box-shadow: var(--shadow), var(--shadow-gold);
}

.product-image {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  overflow: hidden;
  background: var(--black3);
  display: flex;
  align-items: center;
  justify-content: center;
}
.product-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}
.product-card:hover .product-image img { transform: scale(1.08); }

.product-emoji {
  font-size: 64px;
  transition: transform 0.5s ease;
}
.product-card:hover .product-emoji { transform: scale(1.08); }

.product-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  background: #3b82f6;
  color: #ffffff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 2px;
}
.product-badge.sale { background: var(--red); color: white; }
.product-badge.new { background: var(--green); color: white; }

.product-wishlist {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(13,13,13,0.85);
  border: 1px solid rgba(59,130,246,0.3);
  color: var(--cream);
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition);
  font-size: 14px;
  backdrop-filter: blur(10px);
}
.product-wishlist:hover, .product-wishlist.active { background: var(--gold); color: var(--black); border-color: var(--gold); }
.product-wishlist.active { color: var(--red); background: white; }

.product-info {
  padding: 16px;
}
.product-category {
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 6px;
}
.product-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--cream);
  margin-bottom: 8px;
  line-height: 1.4;
  font-family: var(--font-serif);
}
.product-price {
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 0.05em;
  color: var(--gold);
}
.product-price-original {
  font-size: 13px;
  color: var(--gray);
  text-decoration: line-through;
  margin-left: 6px;
}
.product-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.btn-add-cart {
  flex: 1;
  background: var(--black3);
